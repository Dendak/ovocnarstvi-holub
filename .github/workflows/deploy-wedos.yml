name: Deploy React app to Wedos (FTP)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: wedos
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: react-verze/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: react-verze

      - name: Build for Wedos
        run: npm run build
        working-directory: react-verze
        env:
          DEPLOY_TARGET: wedos

      - name: Copy images into dist
        run: cp -r img react-verze/dist/

      - name: Add .htaccess
        run: |
          printf 'DirectoryIndex index.html\nRewriteEngine On\nRewriteCond %%{HTTPS} off\nRewriteRule ^(.*)$ https://%%{HTTP_HOST}%%{REQUEST_URI} [L,R=301]\n' > react-verze/dist/.htaccess

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: react-verze/dist/
          server-dir: /
