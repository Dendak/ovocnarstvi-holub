<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ovocnářství Holub – čerstvé ovoce a mošty z Krtel</title>
    <meta name="description" content="Rodinné ovocnářství v Krtelích u Netolic. Třešně, višně, meruňky, hrušky, švestky, jablka a domácí mošty. Přímý prodej a rozvoz do Českých Budějovic." />
  </head>
  <body>
    <script>
      // Auto-redirect German/Austrian visitors to German page (once)
      if (!sessionStorage.getItem('lang_chosen')) {
        var lang = (navigator.language || navigator.userLanguage || '').toLowerCase();
        if (lang.startsWith('de')) {
          sessionStorage.setItem('lang_chosen', 'de');
          var base = document.querySelector('base');
          var basePath = base ? base.getAttribute('href') : '/';
          window.location.replace(basePath + 'index-de.html');
        } else {
          sessionStorage.setItem('lang_chosen', 'cs');
        }
      }
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
