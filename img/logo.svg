  <!-- Text: Ovocnářství -->
  <text x="82" y="46" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="700" fill="#133e13" letter-spacing="0.5">Ovocnářství</text>

  <!-- Text: HOLUB -->
  <text x="82" y="72" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="700" fill="#1a561a" letter-spacing="3">HOLUB</text>

  <!-- Decorative line -->
  <line x1="82" y1="79" x2="310" y2="79" stroke="#237023" stroke-width="1.5" opacity="0.4"/>

  <!-- Tagline -->
  <text x="82" y="93" font-family="'Arial', sans-serif" font-size="10" fill="#237023" letter-spacing="1.5" opacity="0.8">KRTELY · OD PŘÍRODY</text>
</svg>
