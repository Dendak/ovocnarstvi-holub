<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100">
  <defs>
    <linearGradient id="appleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d8a2d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#133e13;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Apple icon -->
  <!-- Stem -->
  <path d="M50 18 Q54 10 60 12" stroke="#133e13" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Leaf -->
  <path d="M54 14 Q62 8 65 16 Q58 18 54 14Z" fill="#2d8a2d"/>
  <!-- Apple body -->
  <path d="M36 38 Q34 26 44 24 Q50 22 50 28 Q50 22 56 24 Q66 26 64 38 Q68 52 50 62 Q32 52 36 38Z" fill="url(#appleGrad)"/>
  <!-- Apple shine -->
